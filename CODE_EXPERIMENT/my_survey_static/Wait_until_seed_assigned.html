
{{ block content }}
<head>
    <meta http-equiv="refresh" content="{{TIME_REFRESH}}">
</head>
<p>
    <label>Task {{ round_number }} out of 4
        <progress value="{{ round_number }}" max="4">
        </progress>
    </label>
</p>

<div class="explaination-text">
    Your task is being assigned, please wait a few seconds...
</div>


<style>
.button-container {
    display: flex;
    justify-content: center; /* Center-align the buttons horizontally */
    align-items: center; /* Center-align the buttons vertically */
}

button {
    display: inline-block;
    font-weight: 400;
    line-height: 1.5;
    background-color: #0d6efd; /* Change the background color */
    color: white  ; /* Change the text color */
    padding: 10px 20px; /* Adjust padding as needed */
    margin: 10px 0px;
    border: transparent ; /* Change the border style and color */
    text-align: center;
    text-decoration: none;
    vertical-align: middle;
    cursor: pointer;
    font-size: 1rem;
    border-radius: 5px; /* Add rounded corners */
    &:hover{
            cursor: pointer;
            background: #80ACF9;
            border-color: transparent ;
            }

}
</style>
    
{{ endblock }}
