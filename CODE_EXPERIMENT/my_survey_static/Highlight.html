{{ block content }}

	<p>
		<label>Task {{ round_number }} out of 4
		    <progress value="{{ round_number }}" max="4">
		    </progress>
		</label>
	</p>

    <body>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

	<div class="news-container">
	    <div class="news-title">{{ title }}</div>
	    <div class="news-source">Source:  {{ source }}</div>
        <input type='hidden' name="read_more_highlight" id="read_more_highlight" value="0"/>
	    <div class="news-text" id="news-text">{{ abstract }}</div>
        <button type="button" onclick="ReadMore(event)" id="ReadMoreButton">Read more...</button>
        {{ formfield_errors 'read_more_highlight' }}
	</div>

	</body>

    <p>
        <br> How would you interact with this news piece on social media? Choose one option:
    </p>
    {{ formfield 'highlight'}}
    
    <!-- {{formfields}}  -->

    {{ next_button }}

<script>
    function ReadMore(event){
        console.log("Readmore called")
        document.getElementById('news-text').style.webkitLineClamp= 'unset';
        document.getElementById('news-text').innerHTML='{{ text }}'

        document.getElementById('ReadMoreButton').type='hidden';
        document.getElementById('ReadMoreButton').style.visibility='hidden';
        event.preventDefault()

        document.getElementById('read_more_highlight').value = 1;

    }
</script>
