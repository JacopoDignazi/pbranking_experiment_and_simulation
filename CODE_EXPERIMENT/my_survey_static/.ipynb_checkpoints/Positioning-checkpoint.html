
{{ block content }}


<p>

        <progress value="{{ round_number }}" max="5">
        </progress>
    </label>
</p>

    <p>
        In the following task we will focus on the topic of <b>{{ topic }}</b> in the United States.
        <br> If you had to position yourself in favour or against of this topic, what would you choose?
    </p>
		

    {{ formfields }}
    {{ next_button }}
    
<style>
			
	.btn {
		display: inline-block;
		font-weight: 400;
		line-height: 1.5;
		background-color: #0d6efd; /* Change the background color */
        color: white  ; /* Change the text color */
        padding: 10px 20px; /* Adjust padding as needed */
        border: transparent ; /* Change the border style and color */
		text-align: center;
		text-decoration: none;
		vertical-align: middle;
		cursor: pointer;
		font-size: 1rem;
        border-radius: 5px; /* Add rounded corners */

			  	cursor: pointer;
				background: #80ACF9;
				border-color: transparent ;
				}
	}
</style>
